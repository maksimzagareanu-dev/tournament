<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>
<body>

<h1>Teams</h1>

<div id="teams"></div>

<script>
async function loadTeams() {
  const res = await fetch("/teams")
  const teams = await res.json()

  const container = document.getElementById("teams")
  container.innerHTML = ""

  teams.forEach(team => {
    const div = document.createElement("div")

    div.innerHTML = `
      <p>
        ${team.teamName} - ${team.firstName} ${team.lastName}
        <button onclick="deleteTeam('${team._id}')">Удалить</button>
      </p>
    `

    container.appendChild(div)
  })
}

async function deleteTeam(id) {
  await fetch("/teams/" + id, {
    method: "DELETE"
  })

  loadTeams()
}

loadTeams()
</script>

</body>
</html>
