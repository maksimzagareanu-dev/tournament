<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — Tournament</title>
  <style>
    body{font-family:Arial;padding:20px;background:#111;color:#eee}
    input,button{padding:10px;border-radius:8px;border:1px solid #444;background:#1b1b1b;color:#fff}
    button{cursor:pointer}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
    .card{border:1px solid #333;border-radius:12px;padding:12px;margin:10px 0;background:#161616}
    .danger{background:#b00020;border:none}
    small{opacity:.7}
  </style>
</head>
<body>
  <h2>Админка</h2>

  <div class="row">
    <input id="token" placeholder="ADMIN_TOKEN" />
    <button id="load">Загрузить список</button>
    <small>Токен нужен, чтобы никто чужой не удалял</small>
  </div>

  <div id="list"></div>

  <script>
    const listEl = document.getElementById("list");
    const tokenEl = document.getElementById("token");

    async function loadTeams() {
      listEl.innerHTML = "Загрузка...";
      const res = await fetch("/teams");
      const teams = await res.json();

      if (!teams.length) {
        listEl.innerHTML = "<p>Пока пусто</p>";
        return;
      }

      listEl.innerHTML = teams.map(t => `
        <div class="card">
          <div><b>${t.teamName || "(без названия)"}</b></div>
          <div>${t.firstName || ""} ${t.lastName || ""}</div>
          <div>${t.phone || ""} • ${t.birthYear || ""}</div>
          <div><small>ID: ${t._id}</small></div>
          <div class="row" style="margin-top:10px">
            <button class="danger" onclick="deleteTeam('${t._id}')">Удалить</button>
          </div>
        </div>
      `).join("");
    }

    async function deleteTeam(id) {
      if (!confirm("Точно удалить?")) return;

      const token = tokenEl.value.trim();
      if (!token) {
        alert("Введи ADMIN_TOKEN");
        return;
      }

      const res = await fetch(`/teams/${id}`, {
        method: "DELETE",
        headers: { "x-admin-token": token }
      });

      const text = await res.text();

      if (!res.ok) {
        alert("Ошибка: " + text);
        return;
      }

      // обновим список
      loadTeams();
    }

    document.getElementById("load").addEventListener("click", loadTeams);
    window.deleteTeam = deleteTeam;
  </script>
</body>
</html>
